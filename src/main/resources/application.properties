spring.application.name=API_Rate_Limiter

# NO_LOCK | SYNCHRONIZED | REENTRANT_LOCK | NAIVE_ATOMIC | CAS | NAIVE_REDIS | LUA_REDIS
rate-limiter.strategy=NO_LOCK

# Redis (V4 분산 Token Bucket)
spring.data.redis.host=localhost
spring.data.redis.port=6379
rate-limiter.redis.bucket-ttl-seconds=3600

# V5 API 게이트웨이 버킷 TTL (휴면 키 메모리 점유 방지)
rate-limiter.api.bucket-ttl-seconds=60
